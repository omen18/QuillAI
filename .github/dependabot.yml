version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/core/quill-core-py"
    schedule:
      interval: "weekly"
    groups:
      all:
        patterns: ["*"]
    commit-message:
      prefix: "deps(core-py)"
    labels:
      - "dependencies"
      - "python"
      - "core"

  - package-ecosystem: "pip"
    directory: "/core/quill"
    schedule:
      interval: "weekly"
    groups:
      all:
        patterns: ["*"]
    commit-message:
      prefix: "deps(quill)"
    labels:
      - "dependencies"
      - "python"
      - "core"

  - package-ecosystem: "cargo"
    directory: "/core/quill-core"
    schedule:
      interval: "weekly"
    groups:
      all:
        patterns: ["*"]
    commit-message:
      prefix: "deps(core)"
    labels:
      - "dependencies"
      - "rust"
      - "core"

  - package-ecosystem: "cargo"
    directory: "/core/quill-core-base"
    schedule:
      interval: "weekly"
    groups:
      all:
        patterns: ["*"]
    commit-message:
      prefix: "deps(core)"
    labels:
      - "dependencies"
      - "rust"
      - "core"

  - package-ecosystem: "cargo"
    directory: "/core/quill-core-wasm"
    schedule:
      interval: "weekly"
    groups:
      all:
        patterns: ["*"]
    commit-message:
      prefix: "deps(wasm)"
    labels:
      - "dependencies"
      - "rust"
      - "core"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps(ci)"
    labels:
      - "dependencies"
      - "ci"
