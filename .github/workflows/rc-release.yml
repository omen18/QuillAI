name: RC Release

on:
  workflow_dispatch:
    inputs:
      component:
        description: "Component to release"
        required: true
        type: choice
        options:
          - quill-core-py
          - quill
          - quill-core-wasm
          - quill-langchain
          - quill-pydantic
      rc_version:
        description: "RC version override (e.g. 0.25.0-rc.2). Leave empty to auto-increment."
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: rc-release-${{ inputs.component }}

jobs:
  create-rc:
    if: ${{ github.repository == 'omen18/Quill' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.rc.outputs.version }}
      tag_name: ${{ steps.rc.outputs.tag_name }}
      pypi_version: ${{ steps.rc.outputs.pypi_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Ensure running on main
        run: |
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "::error::RC releases must be dispatched from the main branch"
            exit 1
          fi
      - name: Determine RC version
        id: rc
        env:
          RC_VERSION_INPUT: ${{ inputs.rc_version }}
          COMPONENT: ${{ inputs.component }}
        run: |
          # The base version for an RC is the *next* release version, which
          # release-please stores in the manifest on its per-component release
          # branch (e.g. release-please--branches--main--components--quill).
          # main's manifest only holds the *last released* version.
          RELEASE_BRANCH="release-please--branches--main--components--${COMPONENT}"
          if git ls-remote --exit-code --heads origin "$RELEASE_BRANCH" >/dev/null 2>&1; then
            git fetch --depth=1 origin "$RELEASE_BRANCH"
            MANIFEST_JSON=$(git show "FETCH_HEAD:.release-please-manifest.json")
            MANIFEST_SOURCE="release-please branch '$RELEASE_BRANCH'"
          else
            echo "::error::No release-please branch '$RELEASE_BRANCH'. RC releases require a pending release-please PR (i.e. conventional commits since the last release for '$COMPONENT')."
            exit 1
          fi

          # Manifest is keyed by package path (e.g. "core/quill-core-py"), so
          # resolve the path from release-please-config.json by component name.
          BASE_VERSION=$(MANIFEST_JSON="$MANIFEST_JSON" python3 -c "
          import json, os, sys
          with open('release-please-config.json') as f:
              config = json.load(f)
          component = os.environ['COMPONENT']
          path = next(
              (p for p, pkg in config['packages'].items() if pkg.get('component') == component),
              None,
          )
          if path is None:
              sys.exit(f\"component '{component}' not found in release-please-config.json\")
          manifest = json.loads(os.environ['MANIFEST_JSON'])
          if path not in manifest:
              sys.exit(f\"path '{path}' for component '{component}' not in manifest\")
          print(manifest[path])
          ")
          echo "::notice::Base version for $COMPONENT: $BASE_VERSION (from $MANIFEST_SOURCE)"

          if [ -n "$RC_VERSION_INPUT" ]; then
            # Validate: must start with BASE_VERSION-rc. and end with a positive integer
            EXPECTED_PREFIX="${BASE_VERSION}-rc."
            SUFFIX="${RC_VERSION_INPUT#"$EXPECTED_PREFIX"}"
            if [ "$SUFFIX" = "$RC_VERSION_INPUT" ] || ! [[ "$SUFFIX" =~ ^[1-9][0-9]*$ ]]; then
              echo "::error::Invalid rc_version: $RC_VERSION_INPUT (expected: ${BASE_VERSION}-rc.N)"
              exit 1
            fi
            VERSION="$RC_VERSION_INPUT"
          else
            # Find the latest RC tag for this component and bump
            LATEST_RC=$(git tag -l "${COMPONENT}-v${BASE_VERSION}-rc.*" --sort=-v:refname | head -n1)
            if [ -z "$LATEST_RC" ]; then
              RC_NUM=1
            else
              # Extract RC number from tag like "quill-core-py-v0.5.0-rc.3"
              RC_NUM=$(echo "$LATEST_RC" | grep -oP 'rc\.\K[0-9]+')
              RC_NUM=$((RC_NUM + 1))
            fi
            VERSION="${BASE_VERSION}-rc.${RC_NUM}"
          fi

          TAG_NAME="${COMPONENT}-v${VERSION}"

          # PEP 440 format for PyPI: 0.25.0-rc.1 → 0.25.0rc1
          PYPI_VERSION=$(echo "$VERSION" | sed 's/-rc\.\([0-9]*\)/rc\1/')

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "pypi_version=$PYPI_VERSION" >> "$GITHUB_OUTPUT"
          echo "::notice::Creating RC release: $TAG_NAME (PyPI: $PYPI_VERSION)"

      - name: Create tag
        env:
          TAG_NAME: ${{ steps.rc.outputs.tag_name }}
        run: |
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"

  publish-quill-core-py:
    needs: create-rc
    if: inputs.component == 'quill-core-py'
    uses: ./.github/workflows/publish-quill-core-py.yml
    with:
      version: ${{ needs.create-rc.outputs.pypi_version }}
      tag_name: ${{ needs.create-rc.outputs.tag_name }}
    permissions:
      contents: read
      id-token: write

  publish-quill:
    needs: create-rc
    if: inputs.component == 'quill'
    uses: ./.github/workflows/publish-quill.yml
    with:
      version: ${{ needs.create-rc.outputs.pypi_version }}
      tag_name: ${{ needs.create-rc.outputs.tag_name }}
    permissions:
      contents: read
      id-token: write

  publish-quill-core-wasm:
    needs: create-rc
    if: inputs.component == 'quill-core-wasm'
    # RC publishes use the token-based variant. The OIDC variant is reserved
    # for stable releases driven by release-please.yml — npm only allows one
    # Trusted Publisher per package.
    uses: ./.github/workflows/publish-quill-core-wasm-rc.yml
    with:
      version: ${{ needs.create-rc.outputs.version }}
      tag_name: ${{ needs.create-rc.outputs.tag_name }}
      npm_tag: rc
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-quill-langchain:
    needs: create-rc
    if: inputs.component == 'quill-langchain'
    uses: ./.github/workflows/publish-quill-langchain.yml
    with:
      version: ${{ needs.create-rc.outputs.pypi_version }}
      tag_name: ${{ needs.create-rc.outputs.tag_name }}
    permissions:
      contents: read
      id-token: write

  publish-quill-pydantic:
    needs: create-rc
    if: inputs.component == 'quill-pydantic'
    uses: ./.github/workflows/publish-quill-pydantic.yml
    with:
      version: ${{ needs.create-rc.outputs.pypi_version }}
      tag_name: ${{ needs.create-rc.outputs.tag_name }}
    permissions:
      contents: read
      id-token: write

  create-release:
    needs: [create-rc, publish-quill-core-py, publish-quill, publish-quill-core-wasm, publish-quill-langchain, publish-quill-pydantic]
    if: always() && needs.create-rc.result == 'success' && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub pre-release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.create-rc.outputs.tag_name }}
          name: "${{ inputs.component }} ${{ needs.create-rc.outputs.version }}"
          prerelease: true
          generate_release_notes: true
