<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sales report — jaffle_shop</title>
  </head>
  <body>
    <div id="root">
      <style>
        .loader-container {
          position: fixed;
          top: 0;
          left: 0;
          width: 100vw;
          height: 100vh;
          background: linear-gradient(135deg, #07070a 0%, #0d0c15 50%, #02001c 100%);
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: center;
          z-index: 9999;
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
          color: #f4f4f5;
        }
        
        .loader-logo {
          width: 72px;
          height: 72px;
          background: linear-gradient(135deg, #6366f1, #a855f7);
          border-radius: 18px;
          box-shadow: 0 0 35px rgba(139, 92, 246, 0.45);
          display: flex;
          justify-content: center;
          align-items: center;
          font-size: 2.2rem;
          font-family: inherit;
          font-weight: 800;
          color: #fff;
          animation: pulse 2s infinite ease-in-out;
          margin-bottom: 1.8rem;
          position: relative;
        }

        .loader-logo::after {
          content: "Q";
          position: absolute;
        }

        .spinner {
          width: 32px;
          height: 32px;
          border: 3px solid rgba(255, 255, 255, 0.05);
          border-top: 3px solid #8b5cf6;
          border-radius: 50%;
          animation: spin 0.8s linear infinite;
          margin-bottom: 1.2rem;
        }

        .loader-title {
          font-size: 1.2rem;
          font-weight: 700;
          letter-spacing: -0.02em;
          margin-bottom: 0.35rem;
          background: linear-gradient(to right, #ffffff, #d8b4fe);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
        }

        .loader-subtitle {
          font-size: 0.82rem;
          color: #a1a1aa;
          letter-spacing: 0.02em;
        }

        @keyframes spin {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }

        @keyframes pulse {
          0%, 100% { transform: scale(1); box-shadow: 0 0 35px rgba(139, 92, 246, 0.4); }
          50% { transform: scale(1.06); box-shadow: 0 0 50px rgba(139, 92, 246, 0.65); }
        }
      </style>
      <div class="loader-container">
        <div class="loader-logo"></div>
        <div class="spinner"></div>
        <h3 class="loader-title">Quill BI Engine</h3>
        <p class="loader-subtitle">Loading WebAssembly modules...</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
